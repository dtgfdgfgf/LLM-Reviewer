<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Reviewer banner</title>
  <desc id="desc">Decorative banner for the Reviewer project.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="45%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" rx="32" fill="url(#bg)"/>
  <circle cx="972" cy="112" r="118" fill="#1d4ed8" opacity="0.16"/>
  <circle cx="1048" cy="270" r="150" fill="#7c3aed" opacity="0.12"/>
  <circle cx="208" cy="92" r="132" fill="#0ea5e9" opacity="0.10"/>
  <rect x="72" y="70" width="470" height="280" rx="24" fill="#020617" opacity="0.76" stroke="#334155"/>
  <rect x="104" y="112" width="210" height="18" rx="9" fill="#1e293b"/>
  <rect x="104" y="150" width="314" height="14" rx="7" fill="#334155"/>
  <rect x="104" y="178" width="270" height="14" rx="7" fill="#334155"/>
  <rect x="104" y="220" width="126" height="88" rx="16" fill="#0f172a" stroke="#1e293b"/>
  <rect x="248" y="220" width="126" height="88" rx="16" fill="#0f172a" stroke="#1e293b"/>
