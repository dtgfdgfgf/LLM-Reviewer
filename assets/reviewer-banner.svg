  <text x="630" y="238" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#94a3b8">Built on GitHub Copilot SDK, packaged for Windows,</text>
  <text x="630" y="266" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#94a3b8">with SSE streaming, model presets, and final Markdown reports.</text>
