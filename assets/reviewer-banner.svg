  <text x="104" y="106" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#cbd5e1">Local AI review workspace</text>
  <text x="630" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="700" fill="#f8fafc">Reviewer</text>
